# AI 智能翻译工作台 - 配置文件 (YAML)
# 版本：v3.0.0
# 复制此文件为 config.yaml 并修改配置值
# 所有配置项都可以通过 GUI 界面或环境变量覆盖

# ============================================================
# 【快速开始】- 必须设置的配置
# ============================================================

# 直接设置模型名称，自动识别提供商
model_name: "deepseek-chat"  # 支持：deepseek-chat, gpt-4, claude-3 等

# API 密钥配置（仅 DeepSeek，强烈建议使用环境变量）
api_keys:
  deepseek:
    api_key: "your_deepseek_api_key"  # 或通过环境变量 DEEPSEEK_API_KEY
    base_url: "https://api.deepseek.com"

# ============================================================
# 【模型参数】- 影响翻译质量的核心配置
# ============================================================

# 全局默认模型名称
model_name: "deepseek-chat"

# 温度参数 (0.0-2.0)
# - 0.1-0.3: 保守翻译，适合技术文档
# - 0.3-0.5: 平衡模式，推荐默认值
# - 0.7-1.0: 创造性翻译，适合文学翻译
temperature: 0.3

# 核采样参数 (0.0-1.0)
# - 0.7-0.8: 稳定输出
# - 0.8-0.9: 平衡多样性和准确性，推荐默认值
# - 0.9-1.0: 高多样性
top_p: 0.8

# 请求超时时间（秒）
timeout: 60

# 最大重试次数
max_retries: 3

# 连续失败阈值（用于自适应并发控制）
retry_streak_threshold: 3

# 基础重试延迟（秒）
base_retry_delay: 3.0

# ============================================================
# 【双阶段翻译】- 为翻译和校对设置不同的模型参数
# ============================================================
# 说明：系统采用「初译 + 校对」双阶段模式
# - 初译：快速翻译，使用较低温度
# - 校对：润色优化，使用稍高温度
# 如果设置为 null，则使用全局配置

# 初译阶段专用配置
draft_model_name: null  # 翻译模型，null 表示使用全局 model_name
draft_temperature: null  # 翻译温度，null 表示使用全局 temperature（推荐 0.3-0.4）
draft_top_p: null  # 翻译 top_p，null 表示使用全局 top_p（推荐 0.8）
draft_timeout: null  # 翻译超时，null 表示使用全局 timeout
draft_max_tokens: 512  # 翻译最大 token 数（推荐 512-1024）

# 校对阶段专用配置
review_model_name: null  # 校对模型，null 表示使用全局 model_name
review_temperature: null  # 校对温度，null 表示使用全局 temperature（推荐 0.5-0.7）
review_top_p: null  # 校对 top_p，null 表示使用全局 top_p（推荐 0.9）
review_timeout: null  # 校对超时，null 表示使用全局 timeout
review_max_tokens: 512  # 校对最大 token 数（推荐 512-1024）

# ============================================================
# 【双阶段翻译】- 为翻译和校对设置不同的模型参数
# ============================================================
# 说明：系统采用「初译 + 校对」双阶段模式
# - 初译：快速翻译，使用较低温度
# - 校对：润色优化，使用稍高温度
# 如果设置为 null，则使用全局配置

# 初译阶段专用配置
draft_model_name: null  # 翻译模型，例如："deepseek-chat"
draft_temperature: null  # 翻译温度，推荐 0.3-0.5（更保守的翻译）
draft_top_p: null  # 翻译 top_p，推荐 0.8
draft_timeout: null  # 翻译超时（秒）
draft_max_tokens: 512  # 翻译最大 token 数

# 校对阶段专用配置
review_model_name: null  # 校对模型，例如："gpt-4"
review_temperature: null  # 校对温度，推荐 0.5-0.7（更灵活的润色）
review_top_p: null  # 校对 top_p，推荐 0.9
review_timeout: null  # 校对超时（秒）
review_max_tokens: 512  # 校对最大 token 数

# ==================== 并发控制 ====================
# initial_concurrency: 初始并发请求数
initial_concurrency: 8

# max_concurrency: 最大并发请求数（自适应调整的上限）
max_concurrency: 10

# concurrency_cooldown_seconds: 并发度降低后的冷却时间（秒）
concurrency_cooldown_seconds: 5.0

# ==================== 重试配置 ====================
# retry_streak_threshold: 连续成功多少次后提升并发度
retry_streak_threshold: 3

# base_retry_delay: 基础重试延迟（秒）
base_retry_delay: 3.0

# max_retries: 单个请求最大重试次数
max_retries: 3

# timeout: 请求超时时间（秒）
timeout: 60

# ==================== 工作流配置 ====================
# enable_two_pass: 是否启用双阶段处理（初译 + 校对）
enable_two_pass: true

# skip_review_if_local_hit: 本地术语精确命中时是否跳过校对
skip_review_if_local_hit: true

# batch_size: 批处理大小（影响缓存容量等）
batch_size: 1000

# gc_interval: 垃圾回收间隔（每处理多少个任务进行一次 GC）
gc_interval: 2

# ==================== 术语库配置 ====================
# similarity_low: 模糊匹配最低相似度阈值（0-100）
similarity_low: 60

# exact_match_score: 精确匹配置信度（通常设为 100）
exact_match_score: 100

# multiprocess_threshold: 超过多少条术语时使用多进程处理
multiprocess_threshold: 1000

# ==================== 性能优化 ====================
# pool_size: SQLite 连接池大小
pool_size: 5

# cache_capacity: 术语缓存容量（条目数）
cache_capacity: 2000

# cache_ttl_seconds: 缓存过期时间（秒），0 表示永不过期
cache_ttl_seconds: 3600

# ==================== 日志配置 ====================
# log_level: 日志级别 (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level: "INFO"

# log_granularity: 日志粒度 (minimal, basic, normal, detailed, verbose)
log_granularity: "normal"

# log_max_lines: GUI 日志控件最大行数
log_max_lines: 1000

# ==================== GUI 配置 ====================
# gui_window_title: 窗口标题
gui_window_title: "AI 智能翻译工作台 v3.0"

# gui_window_width: 窗口宽度（像素）
gui_window_width: 950

# gui_window_height: 窗口高度（像素）
gui_window_height: 800

# ==================== 提示词配置 ====================
# draft_prompt: 初译提示词模板（支持多行）
draft_prompt: |
  Role: Professional Translator.
  Task: Translate 'Src' to {target_lang}.
  Constraints:
  1. Output JSON ONLY: {{"Trans": "string"}}.
  2. Strictly follow provided TM.
  3. Accurate and direct.

# review_prompt: 校对提示词模板（支持多行）
review_prompt: |
  Role: Senior Language Editor.
  Task: Polish 'Draft' into native {target_lang}.
  Constraints:
  1. Output JSON ONLY: {{"Trans": "string", "Reason": "string"}}.
  2. 'Reason': Max 10 chars. If no change, Reason="".
  3. Focus on flow and tone.

# ==================== 禁止事项配置 ====================
# 说明：这些禁止事项会自动注入到每个翻译请求中，确保翻译质量
# 可以按翻译类型配置不同的禁止规则

# prohibition_config: 禁止事项配置对象
prohibition_config:
  # global_prohibitions: 通用禁止事项（适用于所有翻译类型）
  global_prohibitions:
    - "禁止输出原文或保留未翻译的内容"
    - "禁止添加解释性文字或注释"
    - "禁止改变原文的语气和情感色彩"
    - "禁止使用过于书面化或学术化的表达"
    - "禁止创造原文没有的新内容"
    - "禁止遗漏原文的关键信息"
    - "禁止使用敏感或不适当的词汇"
    - "禁止混用不同语言的表达方式"
  
  # match3_prohibitions: 三消游戏专项禁止事项
  match3_prohibitions:
    - "禁止使用超过 4 个字的道具名称（UI 限制）"
    - "禁止使用生僻字或难以识别的汉字"
    - "禁止使用可能引起文化误解的颜色/形状描述"
    - "禁止使用过于复杂或晦涩的比喻"
    - "禁止使用成人向或暴力倾向的描述"
  
  # ui_prohibitions: UI 界面专项禁止事项
  ui_prohibitions:
    - "禁止使用超过按钮容量的长文本"
    - "禁止使用需要思考才能理解的表达"
    - "禁止使用非标准的 UI 术语（如用'设定'代替'设置'）"
    - "禁止使用可能产生歧义的简短表达"
  
  # dialogue_prohibitions: 对话剧情专项禁止事项
  dialogue_prohibitions:
    - "禁止使用不符合角色性格的语言风格"
    - "禁止过度本地化导致失去原作韵味"
    - "禁止使用与时代背景不符的流行语"
    - "禁止改变对话的情感倾向（严肃→玩笑等）"

# prohibition_type_map: 各翻译类型对应的禁止事项映射（一般不需要修改）
prohibition_type_map:
  match3_item: ["global", "match3"]
  match3_skill: ["global", "match3"]
  match3_level: ["global", "match3"]
  match3_dialogue: ["global", "match3", "dialogue"]
  match3_ui: ["global", "match3", "ui"]
  dialogue: ["global", "dialogue"]
  ui: ["global", "ui"]
  scene: ["global"]
  tutorial: ["global"]
  achievement: ["global"]
  custom: ["global"]

# ==================== 语言配置 ====================
# target_languages: 可选的目标语言列表
# 按优先级分类：
#   T1 - 主要发达国家/经济体（优先支持）
#   T2 - 重要发展中国家/新兴市场
#   T3 - 其他语种（小众但重要）
target_languages:
  # ========== T1 优先级（常用）==========
  - 英语      # English - 国际通用
  - 日语      # Japanese - 日本
  - 韩语      # Korean - 韩国
  - 法语      # French - 法国/瑞士/比利时
  - 德语      # German - 德国/奥地利/瑞士
  - 西班牙语   # Spanish - 西班牙/拉丁美洲
  - 意大利语   # Italian - 意大利/瑞士
  - 葡萄牙语   # Portuguese - 葡萄牙/巴西
  - 俄语      # Russian - 俄罗斯/白俄罗斯
  
  # ========== T2 优先级（重要市场）==========
  - 泰语      # Thai - 泰国
  - 越南语    # Vietnamese - 越南
  - 阿拉伯语   # Arabic - 中东/北非
  - 土耳其语   # Turkish - 土耳其
  - 波斯语    # Persian/Farsi - 伊朗
  - 希伯来语   # Hebrew - 以色列
  - 印地语    # Hindi - 印度
  - 孟加拉语   # Bengali - 孟加拉国
  - 乌尔都语   # Urdu - 巴基斯坦
  - 印尼语    # Indonesian - 印度尼西亚
  - 马来语    # Malay - 马来西亚/新加坡
  - 菲律宾语   # Filipino - 菲律宾
  
  # ========== T3 优先级（小众语种）==========
  # 欧洲其他
  - 波兰语    # Polish - 波兰
  - 乌克兰语   # Ukrainian - 乌克兰
  - 捷克语    # Czech - 捷克
  - 罗马尼亚语  # Romanian - 罗马尼亚
  - 匈牙利语   # Hungarian - 匈牙利
  - 瑞典语    # Swedish - 瑞典
  - 挪威语    # Norwegian - 挪威
  - 丹麦语    # Danish - 丹麦
  - 芬兰语    # Finnish - 芬兰
  - 荷兰语    # Dutch - 荷兰/比利时
  - 希腊语    # Greek - 希腊/塞浦路斯
  
  # 亚洲其他
  - 老挝语    # Lao - 老挝
  - 柬埔寨语   # Khmer - 柬埔寨
  - 缅甸语    # Burmese - 缅甸
  - 僧伽罗语   # Sinhala - 斯里兰卡
  - 尼泊尔语   # Nepali - 尼泊尔
  - 蒙古语    # Mongolian - 蒙古
  - 藏语      # Tibetan - 西藏
  
  # 非洲
  - 斯瓦希里语  # Swahili - 肯尼亚/坦桑尼亚
  - 南非荷兰语  # Afrikaans - 南非
  - 祖鲁语    # Zulu - 南非
  
  # 美洲原住民
  - 克丘亚语   # Quechua - 秘鲁/玻利维亚
  - 瓜拉尼语   # Guarani - 巴拉圭
  
  # 大洋洲
  - 毛利语    # Maori - 新西兰
  
  # 古典/人造语言
  - 世界语    # Esperanto - 人造语言
  - 拉丁语    # Latin - 古典语言

# favorite_languages: 常用语言（上次翻译任务使用的语言）
# 说明：系统会自动记录上次使用的语言，并在 GUI 中显示"⭐ 常用语言"分页
# 可以手动编辑这里，但更推荐在 GUI 中使用后自动保存
favorite_languages:
  - 英语
  - 日语
  - 韩语

# default_source_lang: 默认源语言
default_source_lang: "中文"

# supported_source_langs: 支持的源语言列表
supported_source_langs:
  - 中文
  - 英语
  - 日语
  - 韩语
  - 法语
  - 德语

# ==================== 版本控制和备份 ====================
# enable_version_control: 是否启用 Git 版本控制（实验性功能）
enable_version_control: false

# enable_auto_backup: 是否启用自动备份
enable_auto_backup: false

# backup_dir: 备份目录路径
backup_dir: ".terminology_backups"

# backup_strategy: 备份策略 (hourly, daily, weekly, per_batch)
backup_strategy: "daily"

# ==================== 性能监控 ====================
# enable_performance_monitor: 是否启用性能监控
enable_performance_monitor: false

# perf_sample_interval: 性能采样间隔（秒）
perf_sample_interval: 1.0

# perf_history_size: 性能历史记录数量
perf_history_size: 300
