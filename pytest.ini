[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    # --cov=.
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-report=xml
    # --cov-report=json
    # --numprocesses=auto  # 并行测试

# 标记配置
markers =
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    stress: 压力测试
    slow: 慢速测试
    asyncio: 异步测试
    gui: GUI 测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning

# 超时配置（秒）
timeout = 300

# 重复测试（用于稳定性测试）
# repeat = 3
